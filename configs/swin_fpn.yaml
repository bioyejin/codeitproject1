# configs/swin_fpn.yaml
data:
  unique_only: true
  batch_size: 4
  n_splits: 5
  collate: list           # FasterRCNN 계열 → list

model:
  name: swin_fpn
  num_classes: 57
  pretrained: true
  freeze_backbone: true

train:
  epochs: 20
  lr: 0.0001
  weight_decay: 0.0001
  warmup_epochs: 0
  seed: 42

output:
  save_dir: outputs/weights