# configs/rt_detr.yaml
data:
  unique_only: true
  batch_size: 4
  n_splits: 5
  collate: stack           # DETR 계열 → stack

model:
  name: swin_detr           # 또는 rt_detr, dino
  num_classes: 57
  pretrained: true
  freeze_backbone: true
  box_format: coco          # DETR 계열은 모델 내부에서 변환 처리

train:
  epochs: 20
  lr: 0.0001
  weight_decay: 0.0001
  warmup_epochs: 0
  seed: 42

output:
  save_dir: outputs/weights