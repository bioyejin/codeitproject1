# configs/rt_detr.yaml
data:
  unique_only: true
  batch_size: 4
  n_splits: 5
  collate: stack           # DETR 계열 → stack

model:
  name: rt_detr
  num_classes: 57
  pretrained: true
  freeze_backbone: true
  box_format: xyxy          # torchvision RT-DETR은 FasterRCNN과 동일하게 xyxy 기대

train:
  epochs: 100
  lr: 0.0001
  weight_decay: 0.0001
  warmup: true
  seed: 42

output:
  save_dir: outputs/weights